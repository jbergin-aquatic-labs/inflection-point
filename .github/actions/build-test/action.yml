name: Build & Test
description: Build MCP server, bundle for extension, and build VS Code extension

inputs:
  version:
    description: Unused (reserved for future use).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install & build
      shell: bash
      run: |
        npm ci
        npm run build
